<!DOCTYPE html>
<html>

<head>
    <title>Crop Recommendation System</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg,#4CAF50,#8BC34A);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:400px;
            box-shadow:0px 10px 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:6px 0;
            border-radius:5px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:10px;
            background:#4CAF50;
            border:none;
            color:white;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#45a049;
        }

        .result{
            margin-top:20px;
            padding:10px;
            background:#f0f0f0;
            text-align:center;
            font-weight:bold;
            border-radius:5px;
        }

    </style>

</head>

<body>

<div class="container">

<h2>🌱 Crop Recommendation</h2>

<form action="/predict" method="post">

<input type="number" step="any" name="N" placeholder="Nitrogen (N)" required>

<input type="number" step="any" name="P" placeholder="Phosphorus (P)" required>

<input type="number" step="any" name="K" placeholder="Potassium (K)" required>

<input type="number" step="any" name="temperature" placeholder="Temperature" required>

<input type="number" step="any" name="humidity" placeholder="Humidity" required>

<input type="number" step="any" name="ph" placeholder="pH value" required>

<input type="number" step="any" name="rainfall" placeholder="Rainfall" required>

<button type="submit">Predict Crop</button>

</form>

{% if prediction_text %}

<div class="result">
    {{ prediction_text }}
</div>

{% endif %}

</div>

</body>

</html>
